spring:
  application:
    name: user-service
  profiles:
    active: test
  datasource:
    url: jdbc:mysql://coin-exchange-user-db:3306/user_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: dev-secret-change-me-this-must-be-long-enough-for-hs256-algorithm
  expiration: 3600000
