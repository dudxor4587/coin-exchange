spring:
  application:
    name: funds-service
  profiles:
    active: test
  datasource:
    url: jdbc:mysql://coin-exchange-funds-db:3306/funds_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
  kafka:
    bootstrap-servers: coin-exchange-kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: funds
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: dev-secret-change-me-this-must-be-long-enough-for-hs256-algorithm
  expiration: 3600000

services:
  user:
    base-url: http://coin-exchange-user:8082
