apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trading-db
  namespace: coin-exchange
spec:
  serviceName: trading-db
  replicas: 1
  selector:
    matchLabels:
      app: trading-db
  template:
    metadata:
      labels:
        app: trading-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "1234"
            - name: MYSQL_DATABASE
              value: trading_db
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-db
  namespace: coin-exchange
spec:
  selector:
    app: trading-db
  ports:
    - port: 3306
      targetPort: 3306
