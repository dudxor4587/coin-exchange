apiVersion: apps/v1
kind: Deployment
metadata:
  name: funds
  namespace: coin-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: funds
  template:
    metadata:
      labels:
        app: funds
    spec:
      containers:
        - name: funds
          image: coin-exchange/funds:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://funds-db:3306/funds_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
            - name: SERVICES_USER_BASE_URL
              value: "http://user:8082"
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: funds
  namespace: coin-exchange
spec:
  selector:
    app: funds
  ports:
    - port: 8083
      targetPort: 8083
