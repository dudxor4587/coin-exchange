apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: coin-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: coin-exchange/user:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://user-db:3306/user_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: coin-exchange
spec:
  selector:
    app: user
  ports:
    - port: 8082
      targetPort: 8082
