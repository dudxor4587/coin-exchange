services:
  coin-exchange-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: coin-exchange-gateway
    ports:
      - "8080:8080"
    depends_on:
      coin-exchange-user:
        condition: service_healthy
      coin-exchange-funds:
        condition: service_healthy
      coin-exchange-trading:
        condition: service_healthy
    restart: always

  coin-exchange-funds:
    build:
      context: .
      dockerfile: Dockerfile.funds
    container_name: coin-exchange-funds
    expose:
      - "8083"
    depends_on:
      coin-exchange-funds-db:
        condition: service_healthy
      coin-exchange-kafka:
        condition: service_healthy
      coin-exchange-user:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coin-exchange-trading:
    build:
      context: .
      dockerfile: Dockerfile.trading
    container_name: coin-exchange-trading
    expose:
      - "8084"
    depends_on:
      coin-exchange-trading-db:
        condition: service_healthy
      coin-exchange-redis:
        condition: service_healthy
      coin-exchange-kafka:
        condition: service_healthy
      coin-exchange-funds:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8084/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coin-exchange-user:
    build:
      context: .
      dockerfile: Dockerfile.user
    container_name: coin-exchange-user
    expose:
      - "8082"
    depends_on:
      coin-exchange-user-db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8082/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coin-exchange-notification:
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: coin-exchange-notification
    expose:
      - "8081"
    depends_on:
      coin-exchange-kafka:
        condition: service_healthy
    restart: always

  coin-exchange-user-db:
    image: mysql:8.0
    container_name: coin-exchange-user-db
    ports:
      - "3303:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: user_db
      MYSQL_TIMEZONE: Asia/Seoul
      LANG: ko_KR.UTF-8
    restart: always
    command: --default-time-zone='+09:00'
    cpus: 0.3
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  coin-exchange-funds-db:
    image: mysql:8.0
    container_name: coin-exchange-funds-db
    ports:
      - "3304:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: funds_db
      MYSQL_TIMEZONE: Asia/Seoul
      LANG: ko_KR.UTF-8
    restart: always
    command: --default-time-zone='+09:00'
    cpus: 0.3
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  coin-exchange-trading-db:
    image: mysql:8.0
    container_name: coin-exchange-trading-db
    ports:
      - "3305:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: trading_db
      MYSQL_TIMEZONE: Asia/Seoul
      LANG: ko_KR.UTF-8
    restart: always
    command: --default-time-zone='+09:00'
    cpus: 0.3
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  coin-exchange-kafka:
    image: apache/kafka:3.7.1
    container_name: coin-exchange-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://coin-exchange-kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@coin-exchange-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "8"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  coin-exchange-prometheus:
    image: prom/prometheus:latest
    container_name: coin-exchange-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  coin-exchange-grafana:
    image: grafana/grafana:latest
    container_name: coin-exchange-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: 1234
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - coin-exchange-prometheus
    restart: always

  coin-exchange-redis:
    image: redis:7.2
    container_name: coin-exchange-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    cpus: 0.3
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
