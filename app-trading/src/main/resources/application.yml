spring:
  application:
    name: trading-service
  profiles:
    active: test
  datasource:
    url: jdbc:mysql://coin-exchange-trading-db:3306/trading_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
  data:
    redis:
      host: coin-exchange-redis
      port: 6379
  rabbitmq:
    host: coin-exchange-rabbitmq
    port: 5672
    username: guest
    password: guest
  kafka:
    bootstrap-servers: coin-exchange-kafka:9092
    producer:
      # durable 로그: 모든 복제본에 저장 확인 후 ack (단일 브로커라 실질 acks=1)
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: order-projection
      # 크래시 후 재시작 시 커밋한 offset부터 재개 → 유실 없이 이어서 projection
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # 컨슈머가 DB에 반영을 마친 뒤에 offset 커밋 → at-least-once (유실 방지)
      ack-mode: manual

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: trading-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
        trade_latency_seconds: true
        order.flow.segment: true

jwt:
  secret: dev-secret-change-me-this-must-be-long-enough-for-hs256-algorithm
  expiration: 3600000

matching:
  engine: redis

services:
  funds:
    base-url: http://coin-exchange-funds:8083
