spring:
  application:
    name: trading-service
  profiles:
    active: test
  datasource:
    url: jdbc:mysql://coin-exchange-trading-db:3306/trading_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
  data:
    redis:
      host: coin-exchange-redis
      port: 6379
  rabbitmq:
    host: coin-exchange-rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: trading-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
        trade_latency_seconds: true
        order.flow.segment: true

jwt:
  secret: dev-secret-change-me-this-must-be-long-enough-for-hs256-algorithm
  expiration: 3600000

matching:
  engine: redis

services:
  funds:
    base-url: http://coin-exchange-funds:8083
