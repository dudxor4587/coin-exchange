spring:
  profiles:
    active: test
  datasource:
    url: jdbc:mysql://coin-exchange-mysql:3306/coinExchange?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  data:
    redis:
      host: coin-exchange-redis
      port: 6379
  rabbitmq:
    host: coin-exchange-rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: coin-exchange
    distribution:
      percentiles-histogram:
        http.server.requests: true
        trade_latency_seconds: true

jwt:
  secret: dev-secret-change-me-this-must-be-long-enough-for-hs256-algorithm
  expiration: 3600000

matching:
  engine: redis
